name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v0.4.0, v1.0.0, etc.)

jobs:
  # Verify the tag is on main before publishing to PyPI.
  # V2 tags create GitHub Releases but must NOT publish to PyPI.
  check-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    outputs:
      on-main: ${{ steps.check.outputs.on-main }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if tagged commit is on main
        id: check
        run: |
          git fetch origin main
          if git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "on-main=true" >> $GITHUB_OUTPUT
            echo "Tag is on main — will publish to PyPI"
          else
            echo "on-main=false" >> $GITHUB_OUTPUT
            echo "Tag is NOT on main — skipping PyPI publish"
          fi

  build:
    name: Build Package
    needs: check-main
    if: needs.check-main.outputs.on-main == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing - no API token needed
        # Configure at: https://pypi.org/manage/project/surrealdb-orm/settings/publishing/

  github-release:
    name: Create GitHub Release
    needs: [check-main, build]
    if: needs.check-main.outputs.on-main == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
