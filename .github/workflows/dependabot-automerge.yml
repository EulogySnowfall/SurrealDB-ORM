# Auto-merge Dependabot PRs after successful tests
# Bumps the patch (3rd) digit for security updates: x.y.z → x.y.(z+1)
# Versioning: X=LTS/breaking, Y=features, Z=security patches

name: Dependabot Auto-merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  SURREALDB_URL: http://localhost:8000
  SURREALDB_USER: root
  SURREALDB_PASS: root
  SURREALDB_NAMESPACE: test
  SURREALDB_DATABASE: test

jobs:
  # =============================================================================
  # Check if this is a Dependabot PR
  # =============================================================================
  check-dependabot:
    name: Check Dependabot PR
    runs-on: ubuntu-latest
    outputs:
      is-dependabot: ${{ steps.check.outputs.is-dependabot }}
      is-security: ${{ steps.check.outputs.is-security }}
      is-surrealdb: ${{ steps.check.outputs.is-surrealdb }}
    steps:
      - name: Check if Dependabot PR
        id: check
        run: |
          IS_DEPENDABOT="false"
          IS_SECURITY="false"
          IS_SURREALDB="false"

          if [[ "${{ github.actor }}" == "dependabot[bot]" ]]; then
            IS_DEPENDABOT="true"
          fi

          # Check PR labels for security
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'security') }}" == "true" ]]; then
            IS_SECURITY="true"
          fi

          # Check if it's a SurrealDB update
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'surrealdb') }}" == "true" ]]; then
            IS_SURREALDB="true"
          fi

          echo "is-dependabot=$IS_DEPENDABOT" >> $GITHUB_OUTPUT
          echo "is-security=$IS_SECURITY" >> $GITHUB_OUTPUT
          echo "is-surrealdb=$IS_SURREALDB" >> $GITHUB_OUTPUT

  # =============================================================================
  # Run full test suite for Dependabot PRs
  # =============================================================================
  test-dependabot:
    name: Test Dependabot Changes
    needs: check-dependabot
    if: needs.check-dependabot.outputs.is-dependabot == 'true'
    runs-on: ubuntu-latest
    outputs:
      tests-passed: ${{ steps.test-result.outputs.passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --group lint --group dev

      - name: Run linting
        run: |
          uv run ruff format --check
          uv run ruff check

      - name: Run type checking
        run: uv run python -m mypy src/

      - name: Run unit tests
        run: |
          uv run pytest tests/ -m "not integration" \
            --junitxml=junit-unit.xml \
            --cov=src \
            --cov-branch \
            --cov-report=xml:coverage-unit.xml

      - name: Start SurrealDB
        run: |
          docker compose -f devops/docker-compose.yml up -d surrealdb
          ./devops/wait-for-healthy.sh localhost 8000 60

      - name: Run integration tests
        run: |
          uv run pytest tests/ -m integration \
            --junitxml=junit-integration.xml \
            --cov=src \
            --cov-branch \
            --cov-report=xml:coverage-integration.xml

      - name: Stop SurrealDB
        if: always()
        run: docker compose -f devops/docker-compose.yml down

      - name: Set test result
        id: test-result
        if: success()
        run: echo "passed=true" >> $GITHUB_OUTPUT

  # =============================================================================
  # Auto-merge and create patch version tag
  # =============================================================================
  automerge:
    name: Auto-merge & Tag
    needs: [check-dependabot, test-dependabot]
    if: |
      needs.check-dependabot.outputs.is-dependabot == 'true' &&
      needs.test-dependabot.outputs.tests-passed == 'true'
    runs-on: ubuntu-latest
    outputs:
      merged: ${{ steps.wait-merge.outputs.merged }}
      dependency-names: ${{ steps.dependabot-metadata.outputs.dependency-names }}
      update-type: ${{ steps.dependabot-metadata.outputs.update-type }}
      previous-version-dep: ${{ steps.dependabot-metadata.outputs.previous-version }}
      new-version-dep: ${{ steps.dependabot-metadata.outputs.new-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.PAT_TOKEN }}

      - name: Get Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next security patch version
        id: version
        run: |
          # Versioning scheme: X.Y.Z
          #   X = LTS / breaking changes
          #   Y = feature updates
          #   Z = security patches (bumped here)
          #
          # Example: 0.7.0 → 0.7.1 → 0.7.2, etc.

          # Get current version from pyproject.toml
          CURRENT_VERSION=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT_VERSION"

          # Extract major.minor.patch
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          if [[ -z "$MAJOR" || -z "$MINOR" || -z "$PATCH" ]]; then
            echo "Error: Could not parse version from $CURRENT_VERSION"
            exit 1
          fi

          # Bump the patch (3rd) digit for security update
          NEXT_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          echo "Major: $MAJOR, Minor: $MINOR, Patch: $PATCH"
          echo "Next patch: $NEXT_PATCH"
          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"

          echo "current-version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "new-tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for merge
        id: wait-merge
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=0

          while [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; do
            STATE=$(gh pr view "${{ github.event.pull_request.number }}" --json state -q '.state')

            if [[ "$STATE" == "MERGED" ]]; then
              echo "PR merged successfully"
              echo "merged=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Waiting for PR to merge... (attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS)"
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "PR did not merge in time"
          echo "merged=false" >> $GITHUB_OUTPUT
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout base branch after merge
        if: steps.wait-merge.outputs.merged == 'true'
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          git fetch origin "$BASE_BRANCH"
          git checkout "$BASE_BRANCH"
          git pull origin "$BASE_BRANCH"

      - name: Configure Git
        if: steps.wait-merge.outputs.merged == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update version files and create tag
        if: steps.wait-merge.outputs.merged == 'true'
        run: |
          NEW_TAG="${{ steps.version.outputs.new-tag }}"
          NEW_VERSION="${{ steps.version.outputs.new-version }}"

          echo "Updating version to: $NEW_VERSION"
          echo "Creating tag: $NEW_TAG"

          # Update pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" pyproject.toml

          # Update src/surreal_orm/__init__.py
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" src/surreal_orm/__init__.py

          # Update src/surreal_sdk/__init__.py
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" src/surreal_sdk/__init__.py

          # Update src/surreal_sdk/pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" src/surreal_sdk/pyproject.toml

          # Commit version bump
          git add pyproject.toml src/surreal_orm/__init__.py src/surreal_sdk/__init__.py src/surreal_sdk/pyproject.toml
          git commit -m "chore(release): bump version to $NEW_VERSION [skip ci]"
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          git push origin "$BASE_BRANCH"

          # Create and push tag
          git tag -a "$NEW_TAG" -m "Security patch: ${{ steps.dependabot-metadata.outputs.dependency-names }}"
          git push origin "$NEW_TAG"

          echo "Created tag: $NEW_TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.wait-merge.outputs.merged == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new-tag }}
          name: "Security Patch ${{ steps.version.outputs.new-tag }}"
          body: |
            ## Security Patch Release

            This is an automated security patch release.

            ### Updated Dependencies
            - **Package:** ${{ steps.dependabot-metadata.outputs.dependency-names }}
            - **Update type:** ${{ steps.dependabot-metadata.outputs.update-type }}
            - **From:** ${{ steps.dependabot-metadata.outputs.previous-version }}
            - **To:** ${{ steps.dependabot-metadata.outputs.new-version }}

            ### What's Changed
            ${{ github.event.pull_request.title }}

            ---
            *This release was automatically created by the Dependabot auto-merge workflow.*
          prerelease: false
          generate_release_notes: false

  # =============================================================================
  # Sync dependency update to V2 branch (if the same dep exists there)
  # =============================================================================
  sync-v2:
    name: Sync to V2
    needs: [automerge]
    if: needs.automerge.outputs.merged == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout v2 branch
        uses: actions/checkout@v6
        with:
          ref: v2
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check if dependency exists in v2
        id: check
        run: |
          DEP_NAME="${{ needs.automerge.outputs.dependency-names }}"
          echo "Checking for '$DEP_NAME' in v2 uv.lock..."
          if grep -qi "name = \"${DEP_NAME}\"" uv.lock 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Found '$DEP_NAME' in v2"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "'$DEP_NAME' not found in v2 — skipping sync"
          fi

      - name: Update dependency and create PR
        if: steps.check.outputs.exists == 'true'
        run: |
          DEP_NAME="${{ needs.automerge.outputs.dependency-names }}"
          NEW_VER="${{ needs.automerge.outputs.new-version-dep }}"
          PREV_VER="${{ needs.automerge.outputs.previous-version-dep }}"
          UPDATE_TYPE="${{ needs.automerge.outputs.update-type }}"
          SAFE_DEP=$(echo "$DEP_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')
          BRANCH="chore/sync-${SAFE_DEP}-${NEW_VER}-v2"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Skip if branch already exists (avoid duplicate PRs)
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch $BRANCH already exists — skipping"
            exit 0
          fi

          git checkout -b "$BRANCH"

          uv lock --upgrade-package "$DEP_NAME"

          if git diff --quiet uv.lock; then
            echo "No changes — v2 already up to date for $DEP_NAME"
            exit 0
          fi

          git add uv.lock
          git commit -m "chore(deps): bump $DEP_NAME from $PREV_VER to $NEW_VER in the uv group across 1 directory"
          git push origin "$BRANCH"

          PR_BODY="## Security Sync from Main

          This PR syncs a dependency update that was already tested and merged on \`main\`.

          ### Updated Dependencies
          - **Package:** $DEP_NAME
          - **Update type:** $UPDATE_TYPE
          - **From:** $PREV_VER
          - **To:** $NEW_VER

          ---
          *This PR was automatically created by the security sync workflow.*"

          gh pr create \
            --title "chore(deps): bump $DEP_NAME from $PREV_VER to $NEW_VER (security sync from main)" \
            --body "$PR_BODY" \
            --base v2 \
            --head "$BRANCH" \
            --label "security-sync,dependencies"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
