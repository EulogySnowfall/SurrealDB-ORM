# Auto-merge Dependabot PRs after successful tests
# Bumps the patch (3rd) digit for security updates: x.y.z → x.y.(z+1)
# Versioning: X=LTS/breaking, Y=features, Z=security patches

name: Dependabot Auto-merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  SURREALDB_URL: http://localhost:8000
  SURREALDB_USER: root
  SURREALDB_PASS: root
  SURREALDB_NAMESPACE: test
  SURREALDB_DATABASE: test

jobs:
  # =============================================================================
  # Check if this is a Dependabot PR
  # =============================================================================
  check-dependabot:
    name: Check Dependabot PR
    runs-on: ubuntu-latest
    outputs:
      is-dependabot: ${{ steps.check.outputs.is-dependabot }}
      is-security-sync: ${{ steps.check.outputs.is-security-sync }}
      should-process: ${{ steps.check.outputs.should-process }}
    steps:
      - name: Check if Dependabot or security-sync PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IS_DEPENDABOT="false"
          IS_SECURITY_SYNC="false"

          if [[ "${{ github.actor }}" == "dependabot[bot]" ]]; then
            IS_DEPENDABOT="true"
          fi

          # Read labels via API to avoid race condition with pull_request_target
          # (labels set during PR creation may not be in github.event.pull_request.labels)
          LABELS=$(gh pr view "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "security-sync"; then
            IS_SECURITY_SYNC="true"
          fi

          SHOULD_PROCESS="false"
          if [[ "$IS_DEPENDABOT" == "true" || "$IS_SECURITY_SYNC" == "true" ]]; then
            SHOULD_PROCESS="true"
          fi

          echo "is-dependabot=$IS_DEPENDABOT" >> $GITHUB_OUTPUT
          echo "is-security-sync=$IS_SECURITY_SYNC" >> $GITHUB_OUTPUT
          echo "should-process=$SHOULD_PROCESS" >> $GITHUB_OUTPUT

  # =============================================================================
  # Run full test suite for Dependabot PRs
  # =============================================================================
  test-dependabot:
    name: Test Dependabot Changes
    needs: check-dependabot
    if: needs.check-dependabot.outputs.should-process == 'true'
    runs-on: ubuntu-latest
    outputs:
      tests-passed: ${{ steps.test-result.outputs.passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --group lint --group dev

      - name: Run linting
        run: |
          uv run ruff format --check
          uv run ruff check

      - name: Run type checking
        run: uv run python -m mypy src/

      - name: Run unit tests
        run: |
          uv run pytest tests/ -m "not integration" \
            --junitxml=junit-unit.xml \
            --cov=src \
            --cov-branch \
            --cov-report=xml:coverage-unit.xml

      - name: Start SurrealDB
        run: |
          docker compose -f devops/docker-compose.yml up -d surrealdb
          ./devops/wait-for-healthy.sh localhost 8000 60

      - name: Run integration tests
        run: |
          uv run pytest tests/ -m integration \
            --junitxml=junit-integration.xml \
            --cov=src \
            --cov-branch \
            --cov-report=xml:coverage-integration.xml

      - name: Stop SurrealDB
        if: always()
        run: docker compose -f devops/docker-compose.yml down

      - name: Set test result
        id: test-result
        if: success()
        run: echo "passed=true" >> $GITHUB_OUTPUT

  # =============================================================================
  # Auto-merge and create patch version tag
  # =============================================================================
  automerge:
    name: Auto-merge & Tag
    needs: [check-dependabot, test-dependabot]
    if: |
      needs.check-dependabot.outputs.should-process == 'true' &&
      needs.test-dependabot.outputs.tests-passed == 'true'
    runs-on: ubuntu-latest
    outputs:
      merged: ${{ steps.wait-merge.outputs.merged }}
      dependency-names: ${{ steps.dep-info.outputs.dep-names }}
      update-type: ${{ steps.dep-info.outputs.update-type }}
      previous-version-dep: ${{ steps.dep-info.outputs.prev-ver }}
      new-version-dep: ${{ steps.dep-info.outputs.new-ver }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.PAT_TOKEN }}

      - name: Get Dependabot metadata
        if: needs.check-dependabot.outputs.is-dependabot == 'true'
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata from PR title (security sync)
        if: needs.check-dependabot.outputs.is-security-sync == 'true'
        id: sync-metadata
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          DEP_NAME=$(echo "$TITLE" | sed -n 's/.*bump \(.*\) from.*/\1/p')
          NEW_VER=$(echo "$TITLE" | sed -n 's/.*from .* to \(.*\) (.*/\1/p')
          PREV_VER=$(echo "$TITLE" | sed -n 's/.*from \(.*\) to.*/\1/p')
          echo "dependency-names=$DEP_NAME" >> $GITHUB_OUTPUT
          echo "new-version=$NEW_VER" >> $GITHUB_OUTPUT
          echo "previous-version=$PREV_VER" >> $GITHUB_OUTPUT
          echo "update-type=version-update:semver-patch" >> $GITHUB_OUTPUT

      - name: Resolve dependency info
        id: dep-info
        run: |
          if [[ "${{ needs.check-dependabot.outputs.is-dependabot }}" == "true" ]]; then
            echo "dep-names=${{ steps.dependabot-metadata.outputs.dependency-names }}" >> $GITHUB_OUTPUT
            echo "update-type=${{ steps.dependabot-metadata.outputs.update-type }}" >> $GITHUB_OUTPUT
            echo "prev-ver=${{ steps.dependabot-metadata.outputs.previous-version }}" >> $GITHUB_OUTPUT
            echo "new-ver=${{ steps.dependabot-metadata.outputs.new-version }}" >> $GITHUB_OUTPUT
          else
            echo "dep-names=${{ steps.sync-metadata.outputs.dependency-names }}" >> $GITHUB_OUTPUT
            echo "update-type=${{ steps.sync-metadata.outputs.update-type }}" >> $GITHUB_OUTPUT
            echo "prev-ver=${{ steps.sync-metadata.outputs.previous-version }}" >> $GITHUB_OUTPUT
            echo "new-ver=${{ steps.sync-metadata.outputs.new-version }}" >> $GITHUB_OUTPUT
          fi

      - name: Calculate next security patch version
        id: version
        run: |
          # Versioning scheme: X.Y.Z
          #   X = LTS / breaking changes
          #   Y = feature updates
          #   Z = security patches (bumped here)
          #
          # Example: 0.7.0 → 0.7.1 → 0.7.2, etc.

          # Get current version from pyproject.toml
          CURRENT_VERSION=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT_VERSION"

          # Extract major.minor.patch
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          if [[ -z "$MAJOR" || -z "$MINOR" || -z "$PATCH" ]]; then
            echo "Error: Could not parse version from $CURRENT_VERSION"
            exit 1
          fi

          # Bump the patch (3rd) digit for security update
          NEXT_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          echo "Major: $MAJOR, Minor: $MINOR, Patch: $PATCH"
          echo "Next patch: $NEXT_PATCH"
          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"

          echo "current-version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "new-tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for merge
        id: wait-merge
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=0

          while [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; do
            STATE=$(gh pr view "${{ github.event.pull_request.number }}" --json state -q '.state')

            if [[ "$STATE" == "MERGED" ]]; then
              echo "PR merged successfully"
              echo "merged=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Waiting for PR to merge... (attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS)"
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "PR did not merge in time"
          echo "merged=false" >> $GITHUB_OUTPUT
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout base branch after merge
        if: steps.wait-merge.outputs.merged == 'true'
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          git fetch origin "$BASE_BRANCH"
          git checkout "$BASE_BRANCH"
          git pull origin "$BASE_BRANCH"

      - name: Install uv
        if: steps.wait-merge.outputs.merged == 'true'
        uses: astral-sh/setup-uv@v7

      - name: Configure Git
        if: steps.wait-merge.outputs.merged == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create version bump PR
        if: steps.wait-merge.outputs.merged == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new-version }}"
          NEW_TAG="${{ steps.version.outputs.new-tag }}"
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          BRANCH="chore/release-${NEW_TAG}"
          DEP_NAMES="${{ steps.dep-info.outputs.dep-names }}"
          UPDATE_TYPE="${{ steps.dep-info.outputs.update-type }}"

          echo "Creating version bump PR: $NEW_VERSION on $BASE_BRANCH"

          git checkout -b "$BRANCH"

          # Update version files
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" src/surreal_orm/__init__.py
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" src/surreal_sdk/__init__.py
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" src/surreal_sdk/pyproject.toml

          # Regenerate lockfile
          uv lock

          git add pyproject.toml src/surreal_orm/__init__.py src/surreal_sdk/__init__.py src/surreal_sdk/pyproject.toml uv.lock
          git commit -m "chore(release): bump version to $NEW_VERSION"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(release): bump version to $NEW_VERSION" \
            --body "## Version Bump

          Automated version bump after merging Dependabot PR #${{ github.event.pull_request.number }}.

          ### Updated Dependencies
          - **Package:** $DEP_NAMES
          - **Update type:** $UPDATE_TYPE

          ---
          *This PR was automatically created by the Dependabot auto-merge workflow.*" \
            --base "$BASE_BRANCH" \
            --head "$BRANCH"

          gh pr merge --auto --squash "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

  # =============================================================================
  # Sync dependency update to V2 branch (if the same dep exists there)
  # =============================================================================
  sync-v2:
    name: Sync to V2
    needs: [automerge]
    # Only sync to v2 when the PR targets main (not when it already targets v2)
    if: |
      needs.automerge.outputs.merged == 'true' &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout v2 branch
        uses: actions/checkout@v6
        with:
          ref: v2
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check if dependency exists in v2
        id: check
        run: |
          DEP_NAME="${{ needs.automerge.outputs.dependency-names }}"
          echo "Checking for '$DEP_NAME' in v2 uv.lock..."
          if grep -qi "name = \"${DEP_NAME}\"" uv.lock 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Found '$DEP_NAME' in v2"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "'$DEP_NAME' not found in v2 — skipping sync"
          fi

      - name: Update dependency and create PR
        if: steps.check.outputs.exists == 'true'
        run: |
          DEP_NAME="${{ needs.automerge.outputs.dependency-names }}"
          NEW_VER="${{ needs.automerge.outputs.new-version-dep }}"
          PREV_VER="${{ needs.automerge.outputs.previous-version-dep }}"
          UPDATE_TYPE="${{ needs.automerge.outputs.update-type }}"
          SAFE_DEP=$(echo "$DEP_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g')
          BRANCH="chore/sync-${SAFE_DEP}-${NEW_VER}-v2"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Skip if branch already exists (avoid duplicate PRs)
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch $BRANCH already exists — skipping"
            exit 0
          fi

          git checkout -b "$BRANCH"

          uv lock --upgrade-package "$DEP_NAME"

          if git diff --quiet uv.lock; then
            echo "No changes — v2 already up to date for $DEP_NAME"
            exit 0
          fi

          git add uv.lock
          git commit -m "chore(deps): bump $DEP_NAME from $PREV_VER to $NEW_VER in the uv group across 1 directory"
          git push origin "$BRANCH"

          PR_BODY="## Security Sync from Main

          This PR syncs a dependency update that was already tested and merged on \`main\`.

          ### Updated Dependencies
          - **Package:** $DEP_NAME
          - **Update type:** $UPDATE_TYPE
          - **From:** $PREV_VER
          - **To:** $NEW_VER

          ---
          *This PR was automatically created by the security sync workflow.*"

          gh pr create \
            --title "chore(deps): bump $DEP_NAME from $PREV_VER to $NEW_VER (security sync from main)" \
            --body "$PR_BODY" \
            --base v2 \
            --head "$BRANCH" \
            --label "security-sync,dependencies"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
